services:
  alcatraz.api:
    image: ${DOCKER_REGISTRY-}alcatrazapi
    container_name: Alcatraz.Api
    build:
      context: ./alcatraz.api/src
      dockerfile: Alcatraz.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - Ssh__CA__PrivateKeyPath=/run/alcatraz-ca/alcatraz_ca
      - Nats__Url=nats://alcatraz-nats:4222
      # When unset, the cert response carries the per-sandbox endpoint reported
      # by the worker (direct VM IP, local dev). To route through Traefik, set:
      #   Gateway__Host=ssh.alcatraz.io
      #   Gateway__Port=443
    ports:
      - "8080:8080"
    volumes:
      - alcatraz_ca:/run/alcatraz-ca:ro
    depends_on:
      alcatraz-db:
        condition: service_healthy
      alcatraz-idp:
        condition: service_started
      alcatraz-seq:
        condition: service_started
      alcatraz-redis:
        condition: service_started
      alcatraz-nats:
        condition: service_started
      alcatraz-ca-init:
        condition: service_completed_successfully

  alcatraz-db:
    image: postgres:16
    container_name: Alcatraz.Db
    environment:
      - POSTGRES_DB=alcatraz
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alcatraz"]
      interval: 5s
      timeout: 5s
      retries: 5

  alcatraz-idp:
    image: quay.io/keycloak/keycloak:25.0
    container_name: Alcatraz.Identity
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # Make device-flow verification URLs host-reachable. Without this,
      # Keycloak emits http://alcatraz-idp:8080/... which only resolves
      # inside the docker network.
      - KC_HOSTNAME_URL=http://localhost:8082
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_BACKCHANNEL=false
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./alcatraz.api/.files/alcatraz-realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8082:8080"

  alcatraz-seq:
    image: datalust/seq:2024.3
    container_name: Alcatraz.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:5341"
      - "8083:80"

  alcatraz-redis:
    image: redis:7
    container_name: Alcatraz.Redis
    restart: always
    ports:
      - "6379:6379"

  alcatraz-nats:
    image: nats:2.10
    container_name: Alcatraz.Nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  # Generates the shared SSH CA key into the alcatraz_ca volume on first boot.
  # Idempotent: skips if a key already exists.
  alcatraz-ca-init:
    container_name: Alcatraz.CaInit
    build:
      context: ./alcatraz.api/.files/ca-init
      dockerfile: Dockerfile
    volumes:
      - alcatraz_ca:/run/alcatraz-ca

  # Legacy stand-in for an Alcatraz Firecracker VM. The default flow now points
  # the CLI directly at the worker-reported VM IP, so this is gated behind a
  # profile and won't start with `docker compose up`. Bring it up with
  # `--profile demo-sshd` if you want to test the cert pipeline without a worker.
  alcatraz-demo-sshd:
    container_name: Alcatraz.DemoSshd
    profiles: ["demo-sshd"]
    build:
      context: ./alcatraz.api/.files/demo-sshd
      dockerfile: Dockerfile
    ports:
      - "2222:22"
    volumes:
      - alcatraz_ca:/run/alcatraz-ca:ro
    depends_on:
      alcatraz-ca-init:
        condition: service_completed_successfully

  # Public TLS ingress for SSH-over-TLS. SNI = sandbox UUID; per-sandbox routes
  # are written by `alcatraz-routes` into the traefik_dynamic volume.
  # network_mode: host so Traefik can dial 172.16.0.0/24 (the worker's bridge
  # subnet). Bring up with `--profile gateway` on a public host with DNS for
  # GATEWAY_AUTOCERT_HOST pointed at it.
  alcatraz-traefik:
    image: traefik:3.1
    container_name: Alcatraz.Traefik
    profiles: ["gateway"]
    network_mode: host
    volumes:
      - ./alcatraz.routes/etc/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_dynamic:/etc/traefik/dynamic
      - traefik_acme:/var/lib/traefik/acme
    restart: unless-stopped

  # Subscribes to NATS vm.ready / vm.destroyed (no queue group, fanout) and
  # writes Traefik's dynamic file provider config. Hot-reload picks up changes.
  alcatraz-routes:
    image: ${DOCKER_REGISTRY-}alcatrazroutes
    container_name: Alcatraz.Routes
    profiles: ["gateway"]
    build:
      context: ./alcatraz.routes
    environment:
      - NATS_URL=nats://alcatraz-nats:4222
      - NATS_READY_SUBJECT=vm.ready
      - NATS_DESTROYED_SUBJECT=vm.destroyed
      - OUTPUT_PATH=/output/sandboxes.yml
      - GATEWAY_DOMAIN=${GATEWAY_AUTOCERT_HOST:-ssh.alcatraz.io}
    volumes:
      - traefik_dynamic:/output
    depends_on:
      alcatraz-nats:
        condition: service_started
    restart: unless-stopped

volumes:
  keycloak_data:
  alcatraz_ca:
  traefik_dynamic:
  traefik_acme:
