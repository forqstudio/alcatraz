services:
  forqstudio.api:
    image: ${DOCKER_REGISTRY-}forqstudioapi
    container_name: ForqStudio.Api
    build:
      context: ./alcatraz.api/src
      dockerfile: ForqStudio.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - Ssh__CA__PrivateKeyPath=/run/alcatraz-ca/alcatraz_ca
      - Nats__Url=nats://forqstudio-nats:4222
      # Point the cert response at the demo sshd so `alcatraz ssh` works out of the box.
      # In production, override these to the real ssh.alcatraz.io gateway.
      - Gateway__Host=localhost
      - Gateway__Port=2222
    ports:
      - "8080:8080"
    volumes:
      - alcatraz_ca:/run/alcatraz-ca:ro
    depends_on:
      forqstudio-db:
        condition: service_healthy
      forqstudio-idp:
        condition: service_started
      forqstudio-seq:
        condition: service_started
      forqstudio-redis:
        condition: service_started
      forqstudio-nats:
        condition: service_started
      forqstudio-ca-init:
        condition: service_completed_successfully

  forqstudio-db:
    image: postgres:16
    container_name: ForqStudio.Db
    environment:
      - POSTGRES_DB=forqstudio
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d forqstudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  forqstudio-idp:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ForqStudio.Identity
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # Make device-flow verification URLs host-reachable. Without this,
      # Keycloak emits http://forqstudio-idp:8080/... which only resolves
      # inside the docker network.
      - KC_HOSTNAME_URL=http://localhost:8082
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_BACKCHANNEL=false
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./alcatraz.api/.files/forqstudio-realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8082:8080"

  forqstudio-seq:
    image: datalust/seq:2024.3
    container_name: ForqStudio.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:5341"
      - "8083:80"

  forqstudio-redis:
    image: redis:7
    container_name: ForqStudio.Redis
    restart: always
    ports:
      - "6379:6379"

  forqstudio-nats:
    image: nats:2.10
    container_name: ForqStudio.Nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  # Generates the shared SSH CA key into the alcatraz_ca volume on first boot.
  # Idempotent: skips if a key already exists.
  forqstudio-ca-init:
    container_name: ForqStudio.CaInit
    build:
      context: ./alcatraz.api/.files/ca-init
      dockerfile: Dockerfile
    volumes:
      - alcatraz_ca:/run/alcatraz-ca

  # Stand-in for an Alcatraz Firecracker VM. Mirrors the rootfs convention:
  # user `al` with passwordless sudo, sshd accepting CA-signed user certs whose
  # principal matches whatever is in /etc/ssh/auth_principals/al. The operator
  # writes the sandbox UUID into that file with `docker exec` between sandbox
  # creates (in production, the worker writes it into the AgentFS overlay).
  forqstudio-demo-sshd:
    container_name: ForqStudio.DemoSshd
    build:
      context: ./alcatraz.api/.files/demo-sshd
      dockerfile: Dockerfile
    ports:
      - "2222:22"
    volumes:
      - alcatraz_ca:/run/alcatraz-ca:ro
    depends_on:
      forqstudio-ca-init:
        condition: service_completed_successfully

volumes:
  keycloak_data:
  alcatraz_ca:
